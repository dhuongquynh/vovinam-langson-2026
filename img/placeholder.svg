<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#003F87"/>
      <stop offset="0.5" stop-color="#00295a"/>
      <stop offset="1" stop-color="#001a3d"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="rgba(255,215,0,0.18)"/>
    </pattern>
    <radialGradient id="glow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0" stop-color="rgba(255,215,0,0.25)"/>
      <stop offset="1" stop-color="rgba(255,215,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#dots)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>
  <!-- decorative borders -->
  <rect x="40" y="40" width="720" height="920" fill="none" stroke="#FFD700" stroke-width="3" stroke-dasharray="14 8" opacity="0.5"/>
  <rect x="60" y="60" width="680" height="880" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- center martial-arts mark -->
  <g transform="translate(400,420)">
    <circle r="120" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.6"/>
    <circle r="100" fill="none" stroke="#C8102E" stroke-width="2" opacity="0.7"/>
    <text x="0" y="14" text-anchor="middle" font-family="Barlow Condensed, Arial, sans-serif" font-weight="800" font-size="56" fill="#FFD700">VOVINAM</text>
    <text x="0" y="50" text-anchor="middle" font-family="Be Vietnam Pro, Arial, sans-serif" font-weight="600" font-size="18" fill="rgba(255,255,255,0.7)" letter-spacing="2">LẠNG SƠN</text>
  </g>
  <text x="400" y="640" text-anchor="middle" font-family="Be Vietnam Pro, Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.55)">📷 Thay bằng ảnh thật của các con</text>
  <text x="400" y="670" text-anchor="middle" font-family="Be Vietnam Pro, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)">Đặt file ảnh vào thư mục /img với đúng tên slot</text>
  <!-- corner accents -->
  <path d="M 40,40 L 100,40 M 40,40 L 40,100" stroke="#FFD700" stroke-width="4"/>
  <path d="M 760,40 L 700,40 M 760,40 L 760,100" stroke="#FFD700" stroke-width="4"/>
  <path d="M 40,960 L 100,960 M 40,960 L 40,900" stroke="#FFD700" stroke-width="4"/>
  <path d="M 760,960 L 700,960 M 760,960 L 760,900" stroke="#FFD700" stroke-width="4"/>
</svg>
